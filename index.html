<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="./main.js" defer></script>
    <title>PRODUTOS</title>
</head>
<body class="bg-gray-400 h-screen flex flex-col items-center justify-center">
    <main class="bg-gray-500 flex flex-col items-center justify-start gap-4 h-150 w-150 ">
        <h1 class="text-2xl ">Lista de produtos</h1>
        <input 
            type="text" 
            class="bg-white border rounded px-6 py-1"
            id="codigo"
            placeholder="Código"
        >
        <input 
            type="text" 
            class=" bg-white border rounded px-6 py-1"
            id="produto"
            placeholder="Produto"
        >
        <input 
            type="text" 
            class=" bg-white border rounded px-6 py-1"
            id="quantidade"
            placeholder="Quantidade"
        >

        <div>
            <button 
                class="bg-blue-400 text-white px-4 rounded"
                onclick="adicionarProduto()"
            >
                Adicionar
            </button>
            <button 
                class="bg-blue-400 text-white px-4 rounded"
                onclick="deletarProduto()"
            >
                Deletar
            </button>
        </div>
        <div class="max-h-80 overflow-y-auto border">
            <table class="bg-blue-400 w-full table-fixed">
                <thead >
                    <tr class="bg-white">
                        <th>código</th>
                        <th>Produto</th>
                        <th>Quantidade</th>
                    </tr>
                </thead>
                <tbody  
                        id="lista"  
                        class="bg-red-400"
                >
        
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
